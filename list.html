<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TravelLoop – Packing Checklist</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <style>
    *,*::before,*::after{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    :root{
      --bg:#f7f4ef;
      --surface:#ffffff;
      --accent:#e8a020;
      --accent-soft:#fef3dc;
      --green:#2d6a4f;
      --green-soft:#d8f3dc;
      --danger:#c0392b;
      --danger-soft:#fdecea;
      --text:#1a1a2e;
      --muted:#7a7a8c;
      --border:#e8e4db;
      --shadow:0 4px 24px rgba(26,26,46,0.08);
      --radius:18px;
    }

    body{
      font-family:'DM Sans',sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
    }

    /* Sidebar */
    .sidebar{
      position:fixed;
      top:0;
      left:0;
      width:72px;
      height:100vh;
      background:var(--text);
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:28px 0;
      gap:8px;
      z-index:100;
    }

    .logo-mark{
      width:40px;
      height:40px;
      background:var(--accent);
      border-radius:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:'Playfair Display',serif;
      font-size:18px;
      color:#fff;
      font-weight:700;
      margin-bottom:20px;
    }

    .nav-icon{
      width:44px;
      height:44px;
      border-radius:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      transition:background .2s;
      color:#7a7a9a;
      text-decoration:none;
    }

    .nav-icon:hover{
      background:rgba(255,255,255,.08);
      color:#fff;
    }

    .nav-icon.active{
      background:var(--accent);
      color:#fff;
    }

    .sidebar-bottom{
      margin-top:auto;
    }

    /* Main */
    .main{
      margin-left:72px;
      padding:40px 32px;
    }

    .top-bar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:28px;
      gap:20px;
      flex-wrap:wrap;
    }

    .title-wrap h1{
      font-family:'Playfair Display',serif;
      font-size:36px;
      margin-bottom:6px;
    }

    .title-wrap h1 span{
      color:var(--accent);
    }

    .title-wrap p{
      color:var(--muted);
      font-size:14px;
    }

    .progress-card{
      background:var(--surface);
      border:1.5px solid var(--border);
      border-radius:16px;
      padding:18px 22px;
      min-width:240px;
      box-shadow:var(--shadow);
    }

    .progress-card h3{
      font-size:14px;
      margin-bottom:12px;
    }

    .progress-bar{
      width:100%;
      height:10px;
      background:#ece7dc;
      border-radius:50px;
      overflow:hidden;
      margin-bottom:10px;
    }

    .progress-fill{
      height:100%;
      width:0%;
      background:var(--green);
      transition:width .3s ease;
    }

    .progress-text{
      font-size:13px;
      color:var(--muted);
    }

    /* Layout */
    .grid{
      display:grid;
      grid-template-columns:320px 1fr;
      gap:24px;
    }

    .panel{
      background:var(--surface);
      border:1.5px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }

    /* Add Item Panel */
    .add-panel{
      padding:24px;
      position:sticky;
      top:32px;
      height:fit-content;
    }

    .section-title{
      font-size:18px;
      font-weight:700;
      margin-bottom:20px;
    }

    .field{
      margin-bottom:18px;
    }

    .field label{
      display:block;
      margin-bottom:8px;
      font-size:13px;
      font-weight:600;
    }

    .field input,
    .field select{
      width:100%;
      border:1.5px solid var(--border);
      background:var(--bg);
      border-radius:12px;
      padding:12px 14px;
      font-family:'DM Sans',sans-serif;
      font-size:14px;
      outline:none;
      transition:border-color .2s;
    }

    .field input:focus,
    .field select:focus{
      border-color:var(--accent);
      background:#fff;
    }

    .btn-add{
      width:100%;
      border:none;
      background:var(--text);
      color:#fff;
      border-radius:12px;
      padding:14px;
      font-size:14px;
      font-weight:600;
      cursor:pointer;
      transition:all .2s;
    }

    .btn-add:hover{
      transform:translateY(-1px);
      box-shadow:0 8px 18px rgba(0,0,0,.12);
    }

    /* Checklist */
    .checklist-panel{
      padding:26px;
    }

    .category{
      margin-bottom:30px;
    }

    .category-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:16px;
    }

    .category-title{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:18px;
      font-weight:700;
    }

    .category-count{
      background:var(--accent-soft);
      color:#8a5e00;
      font-size:12px;
      padding:5px 10px;
      border-radius:50px;
      font-weight:600;
    }

    .items{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .item{
      border:1.5px solid var(--border);
      border-radius:14px;
      padding:16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      transition:all .2s;
      background:#fff;
    }

    .item:hover{
      border-color:#d8d1c5;
      transform:translateY(-1px);
    }

    .item-left{
      display:flex;
      align-items:center;
      gap:14px;
    }

    .item-check{
      width:22px;
      height:22px;
      cursor:pointer;
      accent-color:var(--green);
    }

    .item-name{
      font-size:15px;
      font-weight:600;
      transition:all .2s;
    }

    .packed .item-name{
      text-decoration:line-through;
      opacity:.5;
    }

    .item-category{
      font-size:12px;
      color:var(--muted);
      margin-top:4px;
    }

    .item-actions{
      display:flex;
      gap:10px;
    }

    .icon-btn{
      width:38px;
      height:38px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      transition:all .2s;
    }

    .delete-btn{
      background:var(--danger-soft);
      color:var(--danger);
    }

    .delete-btn:hover{
      transform:scale(1.05);
    }

    .empty-state{
      text-align:center;
      padding:50px 20px;
      color:var(--muted);
    }

    .empty-state svg{
      margin-bottom:14px;
      opacity:.4;
    }

    .empty-state h3{
      margin-bottom:8px;
      color:var(--text);
    }

    /* Responsive */
    @media(max-width:900px){
      .grid{
        grid-template-columns:1fr;
      }

      .add-panel{
        position:relative;
        top:0;
      }
    }

    @media(max-width:768px){
      .sidebar{
        top:auto;
        bottom:0;
        width:100%;
        height:64px;
        flex-direction:row;
        justify-content:space-around;
        padding:0 16px;
      }

      .logo-mark{
        display:none;
      }

      .sidebar-bottom{
        margin-top:0;
      }

      .main{
        margin-left:0;
        padding:24px 18px 90px;
      }

      .title-wrap h1{
        font-size:28px;
      }
    }

    @media(max-width:480px){
      .item{
        flex-direction:column;
        align-items:flex-start;
        gap:16px;
      }

      .item-actions{
        width:100%;
        justify-content:flex-end;
      }
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="logo-mark">T</div>

    <a class="nav-icon" href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      </svg>
    </a>

    <a class="nav-icon" href="#">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
        <rect x="2" y="7" width="20" height="14" rx="2"/>
      </svg>
    </a>

    <a class="nav-icon active" href="#">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
        <path d="M9 11l3 3L22 4"/>
        <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
      </svg>
    </a>

    <div class="sidebar-bottom">
      <a class="nav-icon" href="#">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
          <circle cx="12" cy="7" r="4"/>
          <path d="M5.5 21a6.5 6.5 0 0 1 13 0"/>
        </svg>
      </a>
    </div>
  </nav>

  <main class="main">

    <div class="top-bar">
      <div class="title-wrap">
        <h1>Packing <span>Checklist</span></h1>
        <p>Stay organized and never forget your essentials before your trip.</p>
      </div>

      <div class="progress-card">
        <h3>Packing Progress</h3>

        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="progress-text" id="progressText">
          0 of 0 items packed
        </div>
      </div>
    </div>

    <div class="grid">

      <!-- Left Panel -->
      <div class="panel add-panel">
        <h2 class="section-title">Add New Item</h2>

        <div class="field">
          <label>Item Name</label>
          <input type="text" id="itemInput" placeholder="e.g. Passport" />
        </div>

        <div class="field">
          <label>Category</label>
          <select id="categoryInput">
            <option value="Documents">Documents</option>
            <option value="Clothing">Clothing</option>
            <option value="Electronics">Electronics</option>
            <option value="Toiletries">Toiletries</option>
            <option value="Accessories">Accessories</option>
            <option value="Others">Others</option>
          </select>
        </div>

        <button class="btn-add" onclick="addItem()">
          + Add to Checklist
        </button>
      </div>

      <!-- Checklist -->
      <div class="panel checklist-panel">

        <div id="checklistContainer"></div>

        <div class="empty-state" id="emptyState">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="60" height="60">
            <path d="M9 11l3 3L22 4"/>
            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
          </svg>

          <h3>No items added yet</h3>
          <p>Start adding your travel essentials.</p>
        </div>

      </div>

    </div>

  </main>

  <script>

    let packingItems = [
      {
        id: 1,
        name: 'Passport',
        category: 'Documents',
        packed: true
      },
      {
        id: 2,
        name: 'Phone Charger',
        category: 'Electronics',
        packed: false
      },
      {
        id: 3,
        name: 'Jackets',
        category: 'Clothing',
        packed: false
      }
    ];

    function renderChecklist(){

      const container = document.getElementById('checklistContainer');
      const emptyState = document.getElementById('emptyState');

      if(packingItems.length === 0){
        emptyState.style.display = 'block';
        container.innerHTML = '';
        updateProgress();
        return;
      }

      emptyState.style.display = 'none';

      const categories = {};

      packingItems.forEach(item => {
        if(!categories[item.category]){
          categories[item.category] = [];
        }

        categories[item.category].push(item);
      });

      container.innerHTML = Object.keys(categories).map(category => {

        const items = categories[category];

        return `
          <div class="category">

            <div class="category-header">
              <div class="category-title">
                ${category}
              </div>

              <div class="category-count">
                ${items.length} items
              </div>
            </div>

            <div class="items">

              ${items.map(item => `

                <div class="item ${item.packed ? 'packed' : ''}">

                  <div class="item-left">

                    <input
                      type="checkbox"
                      class="item-check"
                      ${item.packed ? 'checked' : ''}
                      onchange="togglePacked(${item.id})"
                    />

                    <div>
                      <div class="item-name">
                        ${item.name}
                      </div>

                      <div class="item-category">
                        ${item.category}
                      </div>
                    </div>

                  </div>

                  <div class="item-actions">

                    <button
                      class="icon-btn delete-btn"
                      onclick="deleteItem(${item.id})"
                    >
                      ✕
                    </button>

                  </div>

                </div>

              `).join('')}

            </div>

          </div>
        `;

      }).join('');

      updateProgress();
    }

    function addItem(){

      const itemInput = document.getElementById('itemInput');
      const categoryInput = document.getElementById('categoryInput');

      const name = itemInput.value.trim();
      const category = categoryInput.value;

      if(!name){
        alert('Please enter an item name');
        return;
      }

      packingItems.unshift({
        id: Date.now(),
        name,
        category,
        packed:false
      });

      itemInput.value = '';

      renderChecklist();
    }

    function togglePacked(id){

      packingItems = packingItems.map(item => {

        if(item.id === id){
          return {
            ...item,
            packed: !item.packed
          };
        }

        return item;
      });

      renderChecklist();
    }

    function deleteItem(id){

      packingItems = packingItems.filter(item => item.id !== id);

      renderChecklist();
    }

    function updateProgress(){

      const total = packingItems.length;

      const packed = packingItems.filter(item => item.packed).length;

      const percent = total === 0 ? 0 : (packed / total) * 100;

      document.getElementById('progressFill').style.width = percent + '%';

      document.getElementById('progressText').innerText = `${packed} of ${total} items packed`;
    }

    document.getElementById('itemInput').addEventListener('keydown', function(e){

      if(e.key === 'Enter'){
        addItem();
      }

    });

    renderChecklist();

  </script>

</body>
</html>
