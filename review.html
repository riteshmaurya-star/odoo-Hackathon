<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelLoop | Destination Reviews</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e14;
            --card: #161b22;
            --accent: #d4ff3f;
            --text: #ffffff;
            --muted: #8b949e;
            --danger: #ff5f5f;
            --star: #ffcc00;
            --border: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            min-height: 100vh;
            padding-bottom: 50px;
        }

        /* Nav Header */
        .nav {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(11, 14, 20, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
        }
        .brand { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; }
        .brand span { color: var(--accent); }
        .back-btn { text-decoration: none; color: var(--accent); font-weight: 600; font-size: 14px; }

        .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }

        h1 { font-family: 'Syne', sans-serif; font-size: 38px; margin-bottom: 10px; }
        .subtitle { color: var(--muted); margin-bottom: 30px; }

        /* Review Form Card */
        .review-form {
            background: var(--card);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid var(--border);
            margin-bottom: 40px;
        }

        .input-box { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--muted); font-size: 14px; }
        
        input, select, textarea {
            width: 100%; background: rgba(255,255,255,0.03);
            border: 1px solid var(--border); color: white;
            padding: 15px; border-radius: 12px; font-family: inherit; outline: none;
        }
        input:focus, textarea:focus { border-color: var(--accent); }

        /* Star Rating */
        .star-rating { display: flex; gap: 10px; margin: 10px 0 20px; }
        .star-rating i { font-size: 24px; cursor: pointer; color: var(--muted); transition: 0.2s; }
        .star-rating i.active { color: var(--star); text-shadow: 0 0 10px rgba(255, 204, 0, 0.3); }

        .btn-submit {
            background: var(--accent); color: #000;
            width: 100%; padding: 15px; border: none;
            border-radius: 12px; font-weight: 800; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px;
        }

        /* Review List */
        .review-card {
            background: var(--card);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
            animation: fadeIn 0.5s ease;
        }
        .rev-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .dest-name { font-weight: 800; font-size: 18px; color: var(--accent); }
        .stars-display { color: var(--star); font-size: 14px; }
        .rev-text { line-height: 1.6; color: #d1d5db; margin: 10px 0; }
        .rev-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        .rev-user { font-size: 12px; color: var(--muted); }
        .rev-tag { font-size: 10px; background: rgba(212, 255, 63, 0.1); color: var(--accent); padding: 4px 10px; border-radius: 6px; }
        
        .delete-btn { background: none; border: none; color: var(--muted); cursor: pointer; transition: 0.3s; }
        .delete-btn:hover { color: var(--danger); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <nav class="nav">
        <div class="brand">Traveloop<span>.</span></div>
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> DASHBOARD</a>
    </nav>

    <div class="container">
        <header>
            <h1>Reviews</h1>
            <p class="subtitle">Share your experiences with the community.</p>
        </header>

        <div class="review-form">
            <div class="input-box">
                <label>Destination Name</label>
                <input type="text" id="destName" placeholder="e.g. Bali, Indonesia">
            </div>

            <label>Your Rating</label>
            <div class="star-rating" id="starContainer">
                <i class="fas fa-star" data-value="1"></i>
                <i class="fas fa-star" data-value="2"></i>
                <i class="fas fa-star" data-value="3"></i>
                <i class="fas fa-star" data-value="4"></i>
                <i class="fas fa-star" data-value="5"></i>
            </div>

            <div class="input-box">
                <label>Vibe / Category</label>
                <select id="vibeTag">
                    <option value="Adventure">Adventure</option>
                    <option value="Relaxation">Relaxation</option>
                    <option value="Nightlife">Nightlife</option>
                    <option value="Culture">Culture</option>
                </select>
            </div>

            <div class="input-box">
                <label>Detailed Review</label>
                <textarea id="reviewText" rows="4" placeholder="Tell us about the food, the locals, and the views..."></textarea>
            </div>

            <button class="btn-submit" onclick="saveReview()">Submit Review</button>
        </div>

        <div id="reviewsFeed"></div>
    </div>

    <script>
        let selectedRating = 0;

        // Star Selection Logic
        const stars = document.querySelectorAll('#starContainer i');
        stars.forEach(star => {
            star.addEventListener('click', () => {
                selectedRating = star.getAttribute('data-value');
                updateStars();
            });
        });

        function updateStars() {
            stars.forEach(s => {
                s.classList.toggle('active', s.getAttribute('data-value') <= selectedRating);
            });
        }

        // Save to LocalStorage
        function saveReview() {
            const name = document.getElementById('destName').value;
            const vibe = document.getElementById('vibeTag').value;
            const text = document.getElementById('reviewText').value;

            if(!name || selectedRating == 0 || !text) {
                alert("Please fill all fields and rate the place!");
                return;
            }

            const review = {
                id: Date.now(),
                destination: name,
                rating: selectedRating,
                vibe: vibe,
                text: text,
                user: "Current Traveler" // You can pull the actual user name here
            };

            const reviews = JSON.parse(localStorage.getItem('travelReviews') || '[]');
            reviews.unshift(review);
            localStorage.setItem('travelReviews', JSON.stringify(reviews));

            // Reset Form
            document.getElementById('destName').value = "";
            document.getElementById('reviewText').value = "";
            selectedRating = 0;
            updateStars();
            
            loadReviews();
        }

        function loadReviews() {
            const reviews = JSON.parse(localStorage.getItem('travelReviews') || '[]');
            const feed = document.getElementById('reviewsFeed');

            feed.innerHTML = reviews.map(rev => `
                <div class="review-card">
                    <div class="rev-header">
                        <span class="dest-name">${rev.destination}</span>
                        <span class="stars-display">${'★'.repeat(rev.rating)}${'☆'.repeat(5-rev.rating)}</span>
                    </div>
                    <p class="rev-text">"${rev.text}"</p>
                    <div class="rev-footer">
                        <div>
                            <span class="rev-tag">${rev.vibe}</span>
                            <span class="rev-user" style="margin-left: 10px;">by ${rev.user}</span>
                        </div>
                        <button class="delete-btn" onclick="deleteReview(${rev.id})">
                            <i class="far fa-trash-alt"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function deleteReview(id) {
            let reviews = JSON.parse(localStorage.getItem('travelReviews') || '[]');
            reviews = reviews.filter(r => r.id !== id);
            localStorage.setItem('travelReviews', JSON.stringify(reviews));
            loadReviews();
        }

        document.addEventListener('DOMContentLoaded', loadReviews);
    </script>
</body>
</html>
